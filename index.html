    <!-- Qui estrapoliamo le informazioni dell'immagine in galleria e le inseriamo nell'offcanvas -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const imageLinks = document.querySelectorAll('.image-link');
            const offcanvasTitle = document.getElementById('offcanvas-title');
            const offcanvasImage = document.getElementById('offcanvas-image');
            const offcanvasText = document.getElementById('offcanvas-text');
            const relatedLink = document.getElementById('related-link');
            const offcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasDetails'));

            imageLinks.forEach(link => {
                link.addEventListener('click', function (event) {
                    event.preventDefault();
                    const imageUrl = this.getAttribute('data-url');
                    const imageTitle = this.getAttribute('data-title');
                    const imageText = this.getAttribute('data-text');
                    const imageYear = this.getAttribute('data-year');
                    const relatedTheme = this.getAttribute('data-related');
                    const relatedThemeLink = this.getAttribute('data-related-link');

                    offcanvasTitle.textContent = imageTitle;
                    offcanvasImage.src = imageUrl;
                    offcanvasText.textContent = imageText;

                    relatedLink.textContent = relatedTheme;
                    relatedLink.href = "#" + relatedThemeLink;
                });
            });

            relatedLink.addEventListener('click', function () {
                offcanvas.hide(); // Chiude l'offcanvas
            });
        });
    </script>
    <!-- Questo script genera una forma casuale ad ogni immagine per l'effetto ritaglio di giornale -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const images = document.querySelectorAll('.gallery-img');

            images.forEach(image => {
                const clipPath = generateRandomClipPath();
                image.style.clipPath = `polygon(${clipPath})`;
            });
        });

        function generateRandomClipPath() {
            const points = [];
            const numPoints = 10; // Numero di punti per il poligono
            const maxDeviation = 20; // Massimo spostamento dai bordi
            const minAngle = 30; // Angolo minimo tra i lati del poligono
            const maxAngle = 150; // Angolo massimo tra i lati del poligono

            let lastAngle = Math.random() * 360; // Angolo casuale iniziale

            for (let i = 0; i < numPoints; i++) {
                const angle = lastAngle + minAngle + Math.random() * (maxAngle - minAngle); // Genera un angolo casuale
                lastAngle = angle % 360; // Aggiorna l'ultimo angolo

                const x = 50 + Math.cos(angle * Math.PI / 180) * (50 + Math.random() * maxDeviation); // Coordinate x casuali
                const y = 50 + Math.sin(angle * Math.PI / 180) * (50 + Math.random() * maxDeviation); // Coordinate y casuali
                points.push(`${x}% ${y}%`);
            }

            return points.join(', ');
        }
    </script>
