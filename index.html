    <!-- Libreria di Cropper.js per il ritaglio immagine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const imageLinks = document.querySelectorAll('.image-link');
            const offcanvasTitle = document.getElementById('offcanvas-title');
            const offcanvasImage = document.getElementById('offcanvas-image');
            const offcanvasText = document.getElementById('offcanvas-text');
            const relatedTheme = document.getElementById('related-theme');
            const offcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasDetails'));
            let cropper;
            let croppedImages = []; // Array per salvare i ritagli

            imageLinks.forEach(link => {
                link.addEventListener('click', function (event) {
                    event.preventDefault();
                    const imageUrl = this.getAttribute('data-url');
                    const imageTitle = this.getAttribute('data-title');
                    const imageText = this.getAttribute('data-text');
                    const imageYear = this.getAttribute('data-year');
                    const relatedThemeName = this.getAttribute('data-related');

                    offcanvasTitle.textContent = imageTitle;
                    offcanvasImage.src = imageUrl;
                    offcanvasText.textContent = imageText;
                    relatedTheme.textContent = relatedThemeName;

                    // Inizializzare Cropper.js sull'immagine
                    if (cropper) {
                        cropper.replace(imageUrl);
                    } else {
                        cropper = new Cropper(offcanvasImage, {
                            aspectRatio: NaN, // Possibilità di ritagliare in qualsiasi proporzione
                            viewMode: 1, // Visualizzazione ritaglio in base alla dimensione dell'immagine
                        });
                    }
                });
            });

            // Al click sul pulsante ritaglia viene creato e salvato il ritaglio
            document.getElementById('cropButton').addEventListener('click', function () {
                // Ottenere i dati del ritaglio
                const croppedCanvas = cropper.getCroppedCanvas();
                const croppedImage = croppedCanvas.toDataURL(); // Immagine ritagliata come base64

                // Aggiungere l'immagine ritagliata all'array dei ritagli
                croppedImages.push(croppedImage);

                // Mostrare un alert informativo sull'avvenuto ritaglio e salvataggio
                alert('Immagine ritagliata e salvata con successo!');
            });

            // Al click sul pulsante "Scarica immagini" converti i ritagli in PDF e avvia il download
            document.getElementById('downloadImagesBtn').addEventListener('click', function () {
                // Creare un nuovo oggetto jsPDF
                const doc = new jsPDF();

                // Aggiungere ogni ritaglio come pagina al PDF
                croppedImages.forEach((croppedImage, index) => {
                    if (index > 0) {
                        doc.addPage();
                    }
                    doc.addImage(croppedImage, 'JPEG', 10, 10, 180, 150); // Aggiungi l'immagine ritagliata come pagina PDF
                });

                // Scaricare il PDF automaticamente dal browser
                doc.save('ritagli.pdf');
            });
        });
    </script>
